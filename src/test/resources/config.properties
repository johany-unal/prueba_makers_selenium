# =============================================================================
# Configuracion general - SauceDemo Smoke Test
# Makers Solutions - Prueba Tecnica QA
# =============================================================================

# URL base de la aplicacion
base.url=https://www.saucedemo.com

# -- Credenciales de prueba ---------------------------------------------------
# Contrasena compartida para todos los usuarios
password=secret_sauce

# Usuarios disponibles en SauceDemo
user.standard=standard_user
user.locked=locked_out_user
user.problem=problem_user
user.performance=performance_glitch_user
user.error=error_user
user.visual=visual_user

# Usuario con credenciales invalidas (para pruebas negativas)
user.invalid=invalid_user
password.invalid=wrong_password

# -- Configuracion del navegador ----------------------------------------------
# Opciones: chrome, firefox, edge
browser=chrome

# Ejecutar en modo headless (true/false)
headless=false

# Timeout implicito en segundos
implicit.wait=10

# Timeout explicito en segundos
explicit.wait=15

# -- Mensajes de error esperados ----------------------------------------------
error.invalid.credentials=Epic sadface: Username and password do not match any user in this service
error.locked.user=Epic sadface: Sorry, this user has been locked out.
error.username.required=Epic sadface: Username is required
error.password.required=Epic sadface: Password is required

# -- URLs esperadas tras login exitoso ----------------------------------------
url.inventory=/inventory.html
